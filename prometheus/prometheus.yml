global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'mtproto-proxy'
    origin: 'balancer'

scrape_configs:
  - job_name: 'telemt-node1'
    static_configs:
      - targets: ['10.10.0.2:9090']
    metrics_path: /metrics
    scrape_interval: 30s
    scrape_timeout: 10s

  - job_name: 'telemt-node2'
    static_configs:
      - targets: ['10.10.0.3:9090']
    metrics_path: /metrics
    scrape_interval: 30s
    scrape_timeout: 10s

  - job_name: 'haproxy'
    static_configs:
      - targets: [ 'haproxy:8404' ]  # имя сервиса в docker-compose
    metrics_path: /metrics
    scrape_interval: 30s
    scrape_timeout: 10s
    # Опционально: добавляем метки
    metric_relabel_configs:
      - source_labels: [ __name__ ]
        regex: 'haproxy_.*'
        action: keep

  - job_name: 'node_balancer'
    static_configs:
      - targets: [ '172.18.0.1:9100' ]  # Node Exporter на балансировщике
    metrics_path: /metrics
    scrape_interval: 30s
    scrape_timeout: 10s

remote_write:
  - url: "https://prometheus-prod-13-prod-us-east-0.grafana.net/api/prom/push"
    basic_auth:
      username: ${GRAFANA_USERNAME}
      password: ${GRAFANA_PASSWORD}
    write_relabel_configs:
      - source_labels: [__name__]
        regex: 'telemt_.*|haproxy_.*|node_.*'
        action: keep
