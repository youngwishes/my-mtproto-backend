global
    log stdout format raw local0 debug
    maxconn 10000                 # Увеличили, т.к. железо позволяет
    user haproxy
    group haproxy
    nbthread 2                    # Использовать 2 потока (если CPU позволяет)
    tune.ssl.default-dh-param 2048
    tune.bufsize 65536             # Увеличили буфер для больших пакетов
    tune.maxrewrite 32768
    tune.ssl.cachesize 50000

defaults
    log global
    mode tcp
    option tcplog
    option dontlognull             # Не логировать пустые соединения
    option redispatch              # Перераспределять при падении сервера
    retries 3                      # Количество повторов при ошибке

    # Таймауты — уменьшили для более быстрой реакции
    timeout connect 2s             # Было 5s
    timeout client 10s             # Было 30s
    timeout server 10s             # Было 30s
    timeout http-keep-alive 10s
    timeout queue 5s
    # Балансировка по наименьшему количеству соединений (для равномерной нагрузки)
    balance leastconn

# Фронтенд для HTTPS (порт 443)
frontend https-in
    bind :443
    mode tcp

    # Оптимизация приёма соединений
    tcp-request inspect-delay 1s   # Было 5s — быстрее принимаем решение
    tcp-request content accept if { req_ssl_hello_type 1 }

    # SNI для telemt-нод (можно объединить для быстроты)
    acl sni_telemt1 req_ssl_sni -i node1.beatvault.ru petrovich.ru
    acl sni_telemt2 req_ssl_sni -i node2.beatvault.ru vss-met.ru
    acl sni_telemt3 req_ssl_sni -i node3.beatvault.ru okno.ru

    # SNI для сайта
    acl sni_site req_ssl_sni -i beatvault.ru www.beatvault.ru flower.beatvault.ru

    # Используем балансировку leastconn
    use_backend telemt-node1 if sni_telemt1
    use_backend telemt-node2 if sni_telemt2
    use_backend telemt-node3 if sni_telemt3
    use_backend nginx-ssl if sni_site

    default_backend nginx-ssl

# Бэкенды с keepalive
backend telemt-node1
    mode tcp
    balance leastconn
    option tcp-check
    tcp-check connect
    server telemt1 192.168.0.4:443 check inter 2s fall 3 rise 2  # Проверки каждые 2с

backend telemt-node2
    mode tcp
    balance leastconn
    option tcp-check
    tcp-check connect
    server telemt2 192.168.0.6:443 check inter 2s fall 3 rise 2

backend telemt-node3
    mode tcp
    balance leastconn
    option tcp-check
    tcp-check connect
    server telemt3 192.168.0.7:443 check inter 2s fall 3 rise 2

# Nginx с keepalive
backend nginx-ssl
    mode tcp
    balance leastconn
    option tcp-check
    tcp-check connect
    server nginx nginx:8443 check inter 2s fall 3 rise 2

# HTTP (можно вообще убрать, если не нужен)
frontend http-in
    bind :80
    mode tcp
    default_backend nginx-http

backend nginx-http
    mode tcp
    server nginx-http nginx:80 check inter 2s fall 3 rise 2

# Статистика
frontend stats
    bind :8404
    mode http
    http-request use-service prometheus-exporter if { path /metrics }
    stats enable
    stats uri /stats
    stats refresh 10s
